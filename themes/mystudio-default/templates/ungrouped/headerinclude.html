<script>
// Override MyBB.popupWindow → BS5 Modal
(function(){
  var popupId='msPopup';
  function ensureModal(){
    var el=document.getElementById(popupId);
    if(el) return el;
    document.body.insertAdjacentHTML('beforeend',
      '<div class="modal fade" id="'+popupId+'" tabindex="-1">'+
      '<div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">'+
      '<div class="modal-content">'+
      '<div class="modal-header py-2" style="background:var(--tekbb-heading-bg);color:var(--tekbb-text-inv)">'+
      '<h6 class="modal-title fw-semibold" id="'+popupId+'Title"></h6>'+
      '<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>'+
      '<div class="modal-body p-0" id="'+popupId+'Body"></div>'+
      '</div></div></div>');
    return document.getElementById(popupId);
  }
  function stripComments(h){return h.replace(/<!--[\s\S]*?-->/g,'');}
  function extractBody(h){
    var m=h.match(/<body[^>]*>([\s\S]*)<\/body>/i);
    return m?m[1]:h;
  }
  function extractModalDiv(h){
    var tmp=document.createElement('div');tmp.innerHTML=h;
    var md=tmp.querySelector('.modal');
    return md?md.innerHTML:h;
  }
  function findTitle(container){
    var th=container.querySelector('.thead');
    if(!th) return '';
    var clone=th.cloneNode(true);
    var close=clone.querySelector('.close-modal');
    if(close) close.remove();
    var txt=clone.textContent.trim();
    th.remove();
    return txt;
  }
  MyBB.popupWindow=function(url){
    var el=ensureModal(),
        titleEl=el.querySelector('#'+popupId+'Title'),
        bodyEl=el.querySelector('#'+popupId+'Body');
    titleEl.textContent='';
    bodyEl.innerHTML='<div class="text-center py-4"><div class="spinner-border text-primary" role="status"></div></div>';
    bootstrap.Modal.getOrCreateInstance(el).show();
    var fullUrl=url.charAt(0)==='/'?rootpath+url:url;
    fetch(fullUrl,{credentials:'same-origin'}).then(function(r){return r.text();}).then(function(html){
      html=stripComments(html);
      var isFullPage=/<body[\s>]/i.test(html);
      var content=isFullPage?extractBody(html):extractModalDiv(html);
      bodyEl.innerHTML=content;
      // Extract & set title from first .thead
      var ttl=findTitle(bodyEl);
      if(ttl) titleEl.textContent=ttl;
      // Remove stale .tborder wrappers (unwrap children)
      bodyEl.querySelectorAll('.tborder').forEach(function(tb){
        while(tb.firstChild) tb.parentNode.insertBefore(tb.firstChild,tb);
        tb.remove();
      });
      // Execute scripts
      bodyEl.querySelectorAll('script').forEach(function(s){
        var n=document.createElement('script');
        if(s.src) n.src=s.src; else n.textContent=s.textContent;
        s.parentNode.replaceChild(n,s);
      });
    }).catch(function(){
      bodyEl.innerHTML='<div class="alert alert-danger m-3">Failed to load content.</div>';
    });
  };
})();


</script>
