<div class="forumbit-row d-flex align-items-center gap-3 px-3 py-2" data-href="{$forum_url}">
<div class="d-none d-md-flex align-items-center justify-content-center forum_{$lightbulb['folder']} ajax_mark_read ficons_{$forum['fid']}" title="{$lightbulb['altonoff']}" id="mark_read_{$forum['fid']}" style="font-size:1.15rem;width:28px;flex-shrink:0">
	<i class="bi bi-chat-left-fill"></i>
</div>
<div class="flex-grow-1 min-w-0">
	<div class="d-flex align-items-center gap-1">
		<span class="d-md-none forum_{$lightbulb['folder']} ajax_mark_read ficons_{$forum['fid']}" title="{$lightbulb['altonoff']}" id="mark_read_{$forum['fid']}"><i class="bi bi-chat-left-fill"></i></span>
		<a href="{$forum_url}" class="fw-semibold text-truncate">{$forum['name']}</a>
	</div>
	<div class="text-muted small text-truncate d-none d-md-block">{$forum['description']}</div>
	<div class="d-md-none small text-muted mt-1">
		<span class="me-2">{$threads} threads</span>
		<span>{$posts} posts</span>
	</div>
	<div class="d-md-none small text-muted mt-1">{$lastpost}</div>
	{$forum_viewers_text}{$modlist}{$subforums}
</div>
<div class="d-none d-md-flex align-items-center gap-2 text-muted small flex-shrink-0">
	<span>{$threads} threads,</span>
	<span>{$posts} posts</span>
</div>
<div class="d-none d-md-block small text-end flex-shrink-0" style="width:200px">
	{$lastpost}
</div>
</div>
