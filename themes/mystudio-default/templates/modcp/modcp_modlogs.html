<html>
<head>
<title>{$mybb->settings['bbname']} - {$lang->modlogs}</title>
{$headerinclude}
</head>
<body>
	{$header}
	<form action="modcp.php?action=modlogs" method="post">
		<div>
			
				{$modcp_nav}
				<div class="col-md-9">
					<div>
						
							<div class="tcat">{$lang->modlogs}</div>
						
						
<div class="tcat rowbit">
  
  
<span class="modcpbit_modlogsmain threadbit_main" data-width="20%">{$lang->username}</span>
 
  
<span class="modcpbit_modlogsdate threadbit_stats" data-width="20%">{$lang->date}</span>
  
<span class="modcpbit_modlogsip threadbit_stats" data-width="20%">{$lang->ip}</span>
  
<span class="modcpbit_modlogsaction threadbit_stats" data-width="20%">{$lang->action}</span>
  
<span class="modcpbit_modlogsdetails threadbit_stats" data-width="20%">{$lang->information}</span>
  
  
</div>
  
						
						{$results}
						{$resultspages}
					</div>
					<br />
					<div>
						
							<div class="tcat">{$lang->filter_modlogs}</div>

<div class="trow1 p-3">
<div class="mb-3">
<label class="formbit_label">{$lang->forum}:</label>
{$forum_select}
</div>

<div class="mb-3">
<label class="formbit_label">{$lang->from_moderator}</label>
<select name="uid" class="form-select form-select-sm">
	<option value="">{$lang->all_moderators}</option>
	<option value="">----------</option>
	{$user_options}
</select>
</div>

<div class="mb-3">
<label class="formbit_label">{$lang->sort_by}</label>
<div class="d-flex gap-2 align-items-center flex-wrap">
<select name="sortby" class="form-select form-select-sm" style="width:auto">
	<option value="dateline" {$sortbysel['dateline']}>{$lang->date}</option>
	<option value="username" {$sortbysel['username']}>{$lang->username}</option>
	<option value="forum" {$sortbysel['forum']}>{$lang->forum_name}</option>
	<option value="thread" {$sortbysel['thread']}>{$lang->thread_subject}</option>
</select>
{$lang->in}
<select name="order" class="form-select form-select-sm" style="width:auto">
	<option value="asc" {$ordersel['asc']}>{$lang->asc}</option>
	<option value="desc" {$ordersel['desc']}>{$lang->desc}</option>
</select>
{$lang->order}
</div>
</div>

<div class="mb-3">
<label class="formbit_label">{$lang->per_page}</label>
<input type="text" name="perpage" value="{$perpage}" class="form-control form-control-sm" style="width:80px" />
</div>
</div>
					<br />
					<div class="align_center">
						<input type="submit" class="button" value="{$lang->filter_logs}" />
					</div>
				</div>
			
		</div>
	</form>
{$footer}
</body>
</html>
