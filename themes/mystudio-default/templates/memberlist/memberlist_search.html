<html>
<head>
<title>{$mybb->settings['bbname']} - {$lang->search_member_list}</title>
{$headerinclude}
</head>
<body>
{$header}
<form method="post" action="memberlist.php">
<div class="tborder">

<div class="thead">{$lang->search_member_list}</div>

<div class="trow1 rowbit">
<div class="formbit_label align_right" data-width="20%"><label for="username">{$lang->username}</label></div>
<div class="formbit_field" data-width="80%">	<select name="username_match">
			<option value="begins">{$lang->begins_with}</option>
			<option value="contains">{$lang->username_contains}</option>
			<option value="exact">{$lang->username_exact}</option>
		</select>
		&nbsp;
		<input type="text" class="textbox" name="username" id="username" />
	</div>
</div>
	
<div class="trow1 rowbit">
<div class="formbit_label align_right" data-width="20%"><label for="website">{$lang->search_website}</label></div>
<div class="formbit_field" data-width="80%"><input type="text" class="textbox" name="website" id="website" /></div>
</div>
	
{$contact_fields['skype']}
{$contact_fields['google']}
{$contact_fields['icq']}

<div class="trow1 mediumtext">{$lang->search_options}</div>

<div class="trow1 rowbit">
<div class="formbit_label align_right" data-width="20%"><label for="sort">{$lang->sort_by}</label></div>
<div class="formbit_field" data-width="80%">
	<select name="sort" id="sort">
			<option value="username">{$lang->sort_by_username}</option>
			<option value="regdate">{$lang->sort_by_regdate}</option>
			<option value="lastvisit">{$lang->sort_by_lastvisit}</option>
			<option value="postnum">{$lang->sort_by_posts}</option>
			<option value="threadnum">{$lang->sort_by_threads}</option>
			{$referrals_option}
		</select> 
		<input type="radio" class="radio" name="order" id="order_asc" value="asc" /> <label for="order_asc">{$lang->order_asc}</label> <input type="radio" class="radio" name="order" id="order_desc" value="desc" checked="checked" /> <label for="order_desc">{$lang->order_desc}</label>
		</div>
</div>

  
<div class="trow1 rowbit">
<div class="formbit_label align_right" data-width="20%"><label for="perpage">{$lang->per_page}</label></div>
<div class="formbit_field" data-width="80%">	<input type="text" class="textbox" size="4" name="perpage" id="perpage" value="15" /></div>
</div>

  
</div>
<div><br /><input type="submit" class="button" name="submit" value="{$lang->search}" /></div>
</form>
{$footer}
  
<script src="{$mybb->asset_url}/themes/mystudio-default/js/user-autocomplete.js"></script>
<script>if(use_xmlhttprequest=="1"){UserAutoComplete('username');}</script>

</body>
</html>
