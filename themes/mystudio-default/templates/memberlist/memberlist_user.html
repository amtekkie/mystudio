<div class="memberlist_card">
<div class="text-center">
	<div class="memberlist_card_avatar">{$user['avatar']}</div>
	<div class="mt-2 fw-semibold">{$user['profilelink']}</div>
	<div class="smalltext text-muted">{$user['usertitle']}</div>
	<div class="mt-1">{$usergroup['groupimage']} {$user['userstars']}</div>
</div>
<div class="memberlist_card_stats">
	<div><span class="text-muted smalltext">{$lang->posts}</span><br><strong>{$user['postnum']}</strong></div>
	<div><span class="text-muted smalltext">{$lang->threads}</span><br><strong>{$user['threadnum']}</strong></div>
</div>
<div class="smalltext text-muted text-center mt-2">{$lang->joined} {$user['regdate']}</div>
</div>
