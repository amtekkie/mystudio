<html>
<head>
	<title>{$mybb->settings['bbname']} - {$lang->edit_lists}</title>
	{$headerinclude}
	<script src="{$mybb->asset_url}/jscripts/usercp.js?ver=1827"></script>
	<script>
		lang.remove_buddy = '{$lang->confirm_remove_buddy}';
		lang.remove_ignored = '{$lang->confirm_remove_ignored}';
		lang.adding_buddy = '{$lang->adding_buddy}';
		lang.adding_ignored = '{$lang->adding_ignored}';
      	lang.buddylist_error = '{$lang->buddylist_error}';
	</script>
	
	<script src="{$mybb->asset_url}/themes/mystudio-default/js/user-autocomplete.js"></script>

</head>
<body>
	{$header}

		{$usercpnav}
<div class="col-md-9">

<!--start-->

<form action="usercp.php" method="post" id="buddy" onsubmit="return UserCP.addBuddy('buddy');">
<input type="hidden" name="action" value="do_editlists" />
<input type="hidden" name="manage" value="buddy" />
<input type="hidden" name="my_post_key" value="{$mybb->post_code}" />
<div>

<div class="thead">{$lang->edit_buddy_list}</div>

<div class="trow1 rowbit">
<div class="formbit_label align_right" data-width="25%">{$lang->username_or_usernames}</div>
<div class="formbit_field" data-width="75%"><input type="text" name="add_username" id="buddy_add_username" style="width: 60%;" class="textbox" /><input type="submit" value="{$lang->add_to_buddies}" id="buddy_submit" class="button" />

<script>if(use_xmlhttprequest=="1"){UserAutoComplete('buddy_add_username',{multiple:true,maxSelection:5});}</script>


</div>
</div>

<div class="tcat">{$lang->current_buddies}</div>

<div class="trow1" id="buddy_container">

<ul id="buddy_list">
{$buddy_list}
</ul>
</div>


</div>

</form>
<br />

<form action="usercp.php" method="post" id="ignored" onsubmit="return UserCP.addBuddy('ignored');">
<input type="hidden" name="action" value="do_editlists" />
<input type="hidden" name="manage" value="ignored" />
<input type="hidden" name="my_post_key" value="{$mybb->post_code}" />
<div>

<div class="thead">{$lang->edit_ignore_list}</div>


<div class="trow1 rowbit">
<div class="formbit_label align_right" data-width="25%">{$lang->username_or_usernames}</div>
<div class="formbit_field" data-width="75%"><input type="text" name="add_username" id="ignored_add_username" style="width: 60%;" class="textbox" /><input type="submit" value="{$lang->ignore_users}" id="ignored_submit" class="button" /></div></div>
<script>if(use_xmlhttprequest=="1"){UserAutoComplete('ignored_add_username',{multiple:true,maxSelection:5});}</script>

<div class="tcat">{$lang->current_ignored_users}</div>
<div class="trow1" id="ignored_container">

<ul id="ignore_list">
								{$ignore_list}
							</ul>
</div>

</div>



</form>

<div id="receivedrequests">
					{$received_requests}
				</div>
<div id="sentrequests">
					{$sent_requests}
				</div>

<!--end-->


</div>
</div>
	{$footer}
</body>
</html>
