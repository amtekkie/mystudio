<div class="forumbit-row d-flex align-items-center gap-3 px-3 py-2">
<div class="d-none d-md-flex align-items-center justify-content-center" style="width:28px;flex-shrink:0">
	<i class="bi bi-chat-dots-fill" style="font-size:1.2rem"></i>
</div>
<div class="flex-grow-1 min-w-0">
	<div class="d-flex align-items-center gap-1 flex-wrap">
		<i class="bi bi-chat-dots-fill d-md-none" style="font-size:1rem"></i>
		<a href="{$forum_url}" class="fw-semibold">{$forum['name']}</a>
	</div>
	<div class="small text-muted mt-1">
		<a href="usercp.php?action=removesubscription&amp;type=forum&amp;fid={$forum['fid']}&amp;my_post_key={$mybb->post_code}">{$lang->unsubscribe}</a> | <a href="newthread.php?fid={$forum['fid']}">{$lang->new_thread}</a>
		<span class="d-none d-md-inline"><span class="mx-1">&middot;</span><i class="bi bi-reply"></i> {$posts} | <i class="bi bi-chat-left-text"></i> {$threads}</span>
	</div>
	<div class="d-md-none small text-muted mt-1">
		<span class="me-2"><i class="bi bi-reply"></i> {$posts}</span>
		<span class="me-2"><i class="bi bi-chat-left-text"></i> {$threads}</span>
	</div>
</div>
<div class="d-none d-md-flex small align-items-center text-end" style="width:160px;flex-shrink:0">
	<span class="min-w-0 flex-grow-1">{$lastpost}</span>
</div>
</div>
