<div class="mb-3 position-relative">
	<label class="form-label small text-muted" for="referrer"><i class="bi bi-person-hearts me-1"></i>{$lang->referrer}</label>
	<input type="text" class="form-control" name="referrername" id="referrer" value="{$referrername}" placeholder="{$lang->search_user}" autocomplete="off" />
	<div id="referrer-results" class="dropdown-menu w-100" style="max-height:200px;overflow-y:auto;"></div>
</div>
<script>
(function(j){
	var inp = j('#referrer'), menu = j('#referrer-results'), timer;
	inp.on('input', function(){
		clearTimeout(timer);
		var q = j.trim(inp.val());
		if(q.length < 2){ menu.removeClass('show').empty(); return; }
		timer = setTimeout(function(){
			j.getJSON('xmlhttp.php?action=get_users', {query: q}, function(data){
				menu.empty();
				if(!data || !data.length){ menu.removeClass('show'); return; }
				j.each(data, function(i, u){
					j('<button type="button" class="dropdown-item"></button>')
						.text(u.text || u.id)
						.on('mousedown', function(e){
							e.preventDefault();
							inp.val(u.text || u.id);
							menu.removeClass('show').empty();
						})
						.appendTo(menu);
				});
				menu.addClass('show');
			});
		}, 250);
	});
	inp.on('blur', function(){ setTimeout(function(){ menu.removeClass('show'); }, 150); });
})(jQuery);
</script>
