<div class="modal fade" id="msRateUserModal" tabindex="-1" aria-hidden="true">
<div class="modal-dialog modal-dialog-centered modal-sm">
<div class="modal-content">
  <div class="modal-header">
    <h6 class="modal-title"><i class="bi bi-star me-1"></i> {$ms_rate_title}</h6>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <form id="msRateForm" data-vote-btn="{$ms_rate_btn_lbl}">
      <input type="hidden" name="my_post_key" value="{$ms_rate_post_code}" />
      <input type="hidden" name="action" value="do_add" />
      <input type="hidden" name="uid" value="{$ms_rate_uid}" />
      <input type="hidden" name="pid" value="0" />
      <input type="hidden" name="rid" value="{$ms_rate_rid}" />
      <input type="hidden" name="nomodal" value="1" />
      <div class="mb-3">
        <label class="form-label small text-muted">Power</label>
        <select name="reputation" class="form-select form-select-sm">{$ms_rate_options}</select>
      </div>
      <div class="mb-3">
        <label class="form-label small text-muted">Comments</label>
        <input type="text" class="form-control form-control-sm" name="comments" maxlength="250" value="{$ms_rate_existing_comments}" />
      </div>
      <div id="msRateResult" class="mb-2"></div>
      <button type="submit" class="btn btn-sm btn-primary w-100"><i class="bi bi-check-lg me-1"></i>{$ms_rate_btn_lbl}</button>
    </form>
  </div>
</div>
</div>
</div>
