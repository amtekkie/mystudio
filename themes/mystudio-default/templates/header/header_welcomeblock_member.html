<div class="dropdown ms-user-dropdown">
	<a href="#" class="d-flex align-items-center gap-2 text-decoration-none" role="button" data-bs-toggle="dropdown" aria-expanded="false" id="msUserDropdown">
		<img src="{$mybb->user['avatar']}" onerror="if(this.src!='images/default_avatar.png')this.src='images/default_avatar.png';" class="rounded-circle ms-nav-avatar" alt="Avatar">
		<i class="bi bi-chevron-down ms-dd-caret"></i>
	</a>
	<ul class="dropdown-menu dropdown-menu-end ms-user-menu" aria-labelledby="msUserDropdown">
		<li class="dropdown-header ms-user-header">
			<a href="#" data-bs-toggle="modal" data-bs-target="#ms_avatar_modal" style="position:relative;display:inline-block;cursor:pointer" title="{$lang->change_avatar}">
				<img src="{$mybb->user['avatar']}" onerror="if(this.src!='images/default_avatar.png')this.src='images/default_avatar.png';" class="rounded-circle" style="width:48px;height:48px;object-fit:cover;border:2px solid var(--tekbb-accent)" alt="">
				<span style="position:absolute;bottom:0;right:0;background:var(--tekbb-accent);color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;border:2px solid var(--bs-dropdown-bg, #fff)"><i class="bi bi-camera-fill"></i></span>
			</a>
			<div class="mt-1 fw-semibold"><a href="{$mybb->settings['bburl']}/member.php?action=profile&amp;uid={$mybb->user['uid']}" class="text-decoration-none" style="color:var(--tekbb-accent)">{$mybb->user['username']}</a></div>
		</li>
		<li><hr class="dropdown-divider"></li>
		{$usercplink}
		{$pmslink}
		{$buddylink}
		{$modcplink}
		{$admincplink}
		<li><hr class="dropdown-divider"></li>
		<li><a class="dropdown-item text-danger" href="{$mybb->settings['bburl']}/member.php?action=logout&amp;logoutkey={$mybb->user['logoutkey']}"><i class="bi bi-box-arrow-right me-2"></i>{$lang->welcome_logout}</a></li>
	</ul>
</div>

<div class="modal fade" id="ms_avatar_modal" tabindex="-1" aria-labelledby="ms_avatar_label" aria-hidden="true">
<div class="modal-dialog modal-dialog-centered" style="max-width:440px">
<div class="modal-content">
	<form enctype="multipart/form-data" action="{$mybb->settings['bburl']}/usercp.php" method="post" id="ms_avatar_form">
		<input type="hidden" name="my_post_key" value="{$mybb->post_code}" />
		<input type="hidden" name="action" value="do_avatar" />
		<div class="modal-header">
			<h6 class="modal-title" id="ms_avatar_label"><i class="bi bi-person-bounding-box me-1"></i> {$lang->change_avatar}</h6>
			<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
		</div>
		<div class="modal-body">
			<div class="text-center mb-3">
				<img src="{$mybb->user['avatar']}" onerror="if(this.src!='images/default_avatar.png')this.src='images/default_avatar.png';" id="ms_avatar_preview" class="rounded-circle" style="width:100px;height:100px;object-fit:cover;border:3px solid var(--tekbb-accent)" alt="Current Avatar" />
			</div>
			<div class="mb-3">
				<label class="form-label small fw-semibold"><i class="bi bi-upload me-1"></i> {$lang->avatar_upload}</label>
				<input type="file" name="avatarupload" class="form-control form-control-sm" accept="image/*" id="ms_avatar_file" />
			</div>
			<div class="mb-2">
				<label class="form-label small fw-semibold"><i class="bi bi-link-45deg me-1"></i> {$lang->avatar_url}</label>
				<input type="text" name="avatarurl" class="form-control form-control-sm" placeholder="https://example.com/avatar.png" value="" />
				<div class="form-text" style="font-size:11px">{$lang->avatar_url_gravatar}</div>
			</div>
		</div>
		<div class="modal-footer d-flex justify-content-between">
			<a href="{$mybb->settings['bburl']}/usercp.php?action=avatar&amp;remove=1&amp;my_post_key={$mybb->post_code}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash me-1"></i> {$lang->remove_avatar}</a>
			<input type="submit" name="submit" class="btn btn-sm btn-primary" value="{$lang->change_avatar}" />
		</div>
	</form>
</div>
</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function(){
	var fi = document.getElementById('ms_avatar_file');
	var pv = document.getElementById('ms_avatar_preview');
	if(fi && pv){
		fi.addEventListener('change', function(){
			if(this.files && this.files[0]){
				var r = new FileReader();
				r.onload = function(e){ pv.src = e.target.result; };
				r.readAsDataURL(this.files[0]);
			}
		});
	}
});
</script>
