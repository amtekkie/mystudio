<html>
<head>
<title>{$mybb->settings['bbname']}</title>
<link rel="alternate" type="application/rss+xml" title="{$lang->latest_announcements} (RSS 2.0)" href="{$mybb->settings['bburl']}/syndication.php?portal=1" />
<link rel="alternate" type="application/atom+xml" title="{$lang->latest_announcements} (Atom 1.0)" href="{$mybb->settings['bburl']}/syndication.php?portal=1&amp;type=atom1.0" />
{$headerinclude}
</head>
<body>
{$header}

<div class="" style="align-items:flex-start;">

	
<div class="row row-offcanvas row-offcanvas-left">	
<div class="col-md-3 sidebar-offcanvas" id="sidebar">{$latestthreads}{$stats}</div>

	<script>
$(document).ready(function () {
  $('[data-toggle="offcanvas"]').click(function () {
    $('.row-offcanvas').toggleClass('active');
	  $('#offcanvas_icon').toggleClass('bi-layout-sidebar').toggleClass('bi-x-lg')
  });
});
</script>
	<div class="d-md-none mb-2 ms-2">
	<button type="button" class="btn btn-outline-secondary btn-sm" data-toggle="offcanvas"><i class="bi bi-layout-sidebar" id="offcanvas_icon"></i></button>
	</div>
<div class="col-md-9">{$announcements}
<br />

<div class="align_center">{$multipage}</div>

</div>
</div>
</div>

  


{$footer}
</body>
</html>
