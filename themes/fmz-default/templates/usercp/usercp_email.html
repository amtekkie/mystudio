<head>
 <title>{$mybb->settings['bbname']} - {$lang->change_email}</title>
 {$headerinclude}
 </head>
 <body>
 {$header}
 <form action="usercp.php" method="post">
 <input type="hidden" name="my_post_key" value="{$mybb->post_code}" />


 {$usercpnav}
<div class="col-md-9">
 {$errors}
 <div>
   <div class="thead">{$lang->change_email}</div>
 <div class="trow1 rowbit">
 <div class="formbit_label align_right" data-width="25%">{$lang->current_password}</div>
 <div class="formbit_field" data-width="75%"><input type="password" class="textbox" name="password" size="25" /></div>
 </div>

 <div class="trow1 rowbit">
 <div class="formbit_label align_right" data-width="25%">{$lang->new_email}</div>
 <div class="formbit_field" data-width="75%"><input type="text" class="textbox" name="email" size="25" maxlength="150" value="{$email}" /></div>
 </div>

 <div class="trow1 rowbit">
 <div class="formbit_label align_right" data-width="25%">{$lang->confirm_email}</div>
 <div class="formbit_field" data-width="75%"><input type="text" class="textbox" name="email2" size="25" maxlength="150" value="{$email2}" /></div>
 </div>
   
 </div>
 <br />
 <div class="align_center">
 <input type="hidden" name="action" value="do_email" />
 <input type="submit" class="button" name="submit" value="{$lang->update_email}" />
 </div>
 </div>
</div>

 </form>
 {$footer}
 </body>
 </html>
