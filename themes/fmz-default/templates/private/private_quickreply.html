<br />
<form action="private.php" method="post" name="input">
	<input type="hidden" name="my_post_key" value="{$mybb->post_code}" />
	<input type="hidden" name="to" value="{$to}" />
	<input type="hidden" name="bcc" value="{$bcc_form_val}" />
	<input type="hidden" name="subject" value="{$lang->fmz_pm_reply_prefix} {$subject}" />
	<input type="hidden" name="action" value="do_send" />
	<input type="hidden" name="pmid" value="{$pmid}" />
	<input type="hidden" name="do" value="reply" />
	
	<div class="tborder">
		<div class="thead">
			<div class="expcolimage" data-controls="quickreply"></div>
			<div><strong>{$lang->quick_reply}</strong></div>
		</div>
		<div class="tbody" style="{$collapsed['quickreply_e']}" id="quickreply_e">
			<div class="rowbit trow1">
			<div data-width="25%">
					<strong>{$lang->message}</strong><br />
					<div class="smalltext">{$lang->message_note}<br /><br />
					<label><input type="checkbox" class="checkbox" name="options[signature]" value="1" {$optionschecked['signature']} />&nbsp;<strong>{$lang->quickreply_signature}</strong></label><br />
					<label><input type="checkbox" class="checkbox" name="options[disablesmilies]" value="1" {$optionschecked['disablesmilies']} />&nbsp;<strong>{$lang->quickreply_disable_smilies}</strong></label><br />
					<label><input type="checkbox" class="checkbox" name="options[savecopy]" value="1" {$optionschecked['savecopy']} />&nbsp;<strong>{$lang->quickreply_save_copy}</strong></label>{$private_send_tracking}</div>
			</div>
			<div data-width="75%">
				<textarea style="padding: 4px; margin: 0;" name="message" id="message" tabindex="1"></textarea>
					<div class="align_center col-md-12">
						<input type="submit" class="button" value="{$lang->send_message}" tabindex="2" accesskey="s" />
						<input type="submit" class="button" name="preview" value="{$lang->preview}" tabindex="3" />
					</div>
			</div>
		</div>		
		</div>
	</div>
</form>
