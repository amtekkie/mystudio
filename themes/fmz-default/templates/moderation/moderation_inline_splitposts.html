<html>
<head>
<title>{$mybb->settings['bbname']} - {$lang->split_thread}</title>
{$headerinclude}
</head>
<body>
{$header}
<form action="moderation.php" method="post">
<input type="hidden" name="my_post_key" value="{$mybb->post_code}" />
<div class="tborder">

<div class="thead">{$lang->split_thread}</div>


<div class="tcat"><span class="smalltext">{$lang->new_thread_info}</span></div>

{$loginbox}

  
<div class="trow1 rowbit">
<div class="formbit_label align_right" data-width="20%">{$lang->new_subject}</div>
<div class="formbit_field" data-width="80%"><input type="text" class="textbox" name="newsubject" value="{$lang->split_thread_subject} {$thread['subject']}" size="50" /></div>
</div>
  
<div class="trow1 rowbit">
<div class="formbit_label align_right" data-width="20%">{$lang->new_forum}</div>
<div class="formbit_field" data-width="80%">{$forumselect}</div>
</div>
  
</div>
<br />
<div class="align_center"><input type="submit" class="button" name="submit" value="{$lang->split_thread}" /></div>
<input type="hidden" name="action" value="do_multisplitposts" />
<input type="hidden" name="tid" value="{$tid}" />
<input type="hidden" name="posts" value="{$inlineids}" />
<input type="hidden" name="url" value="{$return_url}" />
</form>
{$footer}
</body>
</html>
