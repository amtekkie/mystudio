<h5 class="mb-1 fw-bold">{$lang->welcome_guest} {$mybb->settings['bbname']}</h5>

<div class="d-flex justify-content-center gap-2 mb-2">
<a href="{$mybb->settings['bburl']}/member.php?action=login" data-bs-toggle="modal" data-bs-target="#quick_login" class="btn btn-primary btn-sm"><i class="bi bi-box-arrow-in-right me-1"></i>{$lang->welcome_login}</a>
<a href="{$mybb->settings['bburl']}/member.php?action=register" class="btn btn-success btn-sm"><i class="bi bi-person-plus-fill me-1"></i>{$lang->welcome_register}</a>

<a href="{$mybb->settings['bburl']}/search.php?action=getnew" class="text-decoration-none small" style="color:var(--tekbb-accent)"><i class="bi bi-chat-left-text me-1"></i>{$lang->welcome_newposts}</a>

<div class="modal fade" id="quick_login" tabindex="-1" aria-labelledby="quick_login_label" aria-hidden="true">
<div class="modal-dialog modal-dialog-centered" style="max-width:400px">
<div class="modal-content">
    <form method="post" action="{$mybb->settings['bburl']}/member.php">
        <input name="my_post_key" type="hidden" value="{$mybb->post_code}" />
        <input name="action" type="hidden" value="do_login" />
        <input name="url" type="hidden" value="" />
        <input name="quick_login" type="hidden" value="1" />
        <div class="modal-header">
            <h5 class="modal-title" id="quick_login_label"><i class="bi bi-shield-lock me-1"></i>{$lang->login}</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                <input name="quick_username" id="quick_login_username" type="text" value="" class="form-control" placeholder="{$lang->fmz_placeholder_username}" />
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                <input name="quick_password" id="quick_login_password" type="password" value="" class="form-control" placeholder="{$lang->fmz_placeholder_password}" />
            </div>
            <div class="d-flex justify-content-between align-items-center">
                <div class="form-check">
                    <input name="quick_remember" id="quick_login_remember" type="checkbox" value="yes" class="form-check-input" checked="checked" />
                    <label for="quick_login_remember" class="form-check-label small">{$lang->remember_me}</label>
                </div>
                <a href="{$mybb->settings['bburl']}/member.php?action=lostpw" class="small">{$lang->lost_password}</a>
            </div>
        </div>
        <div class="modal-footer">
            <input name="submit" type="submit" class="btn btn-primary w-100" value="{$lang->login}" />
        </div>
    </form>
</div>
</div>
</div>
